<!--
  ════════════════════════════════════════════════════════════════════════
  BBA SCHOLARSHIP — standalone application form.
  Use this to recreate the fields in GHL's form builder, or paste into a GHL
  Custom Code element. Submit handling (GHL form action / webhook) is up to
  how you wire it in GHL.
  ════════════════════════════════════════════════════════════════════════
-->
<style>
  @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700;800;900&display=swap');
  .bba-form * { box-sizing: border-box; }
  .bba-form {
    --bg:#16181c; --panel:#1e2127; --white:#f4f5f7; --grey:#a4a9b3;
    --line:#30343c; --accent:#38b6ff; --accent-dim:rgba(56,182,255,.13);
    max-width: 560px; margin: 0 auto; padding: 26px 20px;
    background: var(--panel); border: 1px solid var(--line); border-radius: 16px;
    font-family: 'Inter', system-ui, sans-serif; color: var(--white);
  }
  .bba-form h2 {
    font-family: 'Archivo Black', sans-serif; text-transform: uppercase;
    text-align: center; font-size: 26px; margin: 0 0 18px;
  }
  .bba-field { margin-bottom: 16px; }
  .bba-field label { display:block; font-weight:700; font-size:13px; margin-bottom:7px; }
  .bba-field label .req { color: var(--accent); }
  .bba-field input,
  .bba-field textarea,
  .bba-field select {
    width:100%; background:var(--bg); border:1px solid var(--line);
    border-radius:10px; color:var(--white); font-family:inherit; font-size:16px;
    padding:13px 14px;
  }
  .bba-field input::placeholder, .bba-field textarea::placeholder { color:#565b64; }
  .bba-field input:focus, .bba-field textarea:focus, .bba-field select:focus {
    outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-dim);
  }
  .bba-field textarea { resize:vertical; min-height:88px; }
  .bba-submit {
    width:100%; background:var(--accent); color:#0c2230;
    font-family:'Archivo Black', sans-serif; text-transform:uppercase; font-size:17px;
    border:none; border-radius:12px; padding:18px; cursor:pointer; margin-top:6px;
  }
  .bba-foot { text-align:center; color:#5c616b; font-size:11px; margin-top:14px; }
</style>

<form class="bba-form" name="bba-scholarship">
  <h2>Apply Now</h2>

  <div class="bba-field">
    <label>Full Name <span class="req">*</span></label>
    <input type="text" name="full_name" placeholder="Your name" required>
  </div>

  <div class="bba-field">
    <label>Email <span class="req">*</span></label>
    <input type="email" name="email" placeholder="you@email.com" required>
  </div>

  <div class="bba-field">
    <label>Phone <span class="req">*</span></label>
    <input type="tel" name="phone" placeholder="Best contact number" required>
  </div>

  <div class="bba-field">
    <label>Which BBA Coach are you coming to this application from? <span class="req">*</span></label>
    <select name="coach" required>
      <option value="" disabled selected>Select your coach</option>
      <option value="Jase">Jase</option>
      <option value="Carly">Carly</option>
      <option value="Dom">Dom</option>
      <option value="Erin">Erin</option>
    </select>
  </div>

  <div class="bba-field">
    <label>Where are you originally coming to this application from? <span class="req">*</span></label>
    <select name="source" required>
      <option value="" disabled selected>Select a source</option>
      <option value="Facebook">Facebook</option>
      <option value="Instagram">Instagram</option>
      <option value="Tiktok">Tiktok</option>
      <option value="YouTube">YouTube</option>
      <option value="LinkedIn">LinkedIn</option>
      <option value="BBA Podcast">BBA Podcast</option>
      <option value="Website">Website</option>
      <option value="Email">Email</option>
    </select>
  </div>

  <div class="bba-field">
    <label>Instagram Username <span class="req">*</span></label>
    <input type="text" name="instagram" placeholder="@yourhandle" required>
  </div>

  <div class="bba-field">
    <label>Facebook Name or TikTok Username</label>
    <input type="text" name="facebook_tiktok" placeholder="Optional">
  </div>

  <div class="bba-field">
    <label>How old are you currently? <span class="req">*</span></label>
    <input type="number" name="age" placeholder="e.g. 44" required>
  </div>

  <div class="bba-field">
    <label>What City and Country are you located in? <span class="req">*</span></label>
    <input type="text" name="location" placeholder="e.g. Sydney, Australia" required>
  </div>

  <div class="bba-field">
    <label>What health, fitness or life goals are you looking to achieve if we were to choose you? <span class="req">*</span></label>
    <textarea name="goals" placeholder="Be specific — what does this change for you?" required></textarea>
  </div>

  <div class="bba-field">
    <label>Please tell us why we should choose you? <span class="req">*</span></label>
    <textarea name="why" placeholder="This is your shot — make it count." required></textarea>
  </div>

  <button type="submit" class="bba-submit">Submit Application</button>
  <p class="bba-foot">⚠ One more step after this — you'll need to DM us on Instagram to qualify. Winner announced soon.</p>
</form>

<script>
  (function () {
    var form = document.querySelector('form.bba-form');
    if (!form) return;

    // ── CONFIG ──────────────────────────────────────────────────────────
    // 1) Google Sheet (your existing Apps Script Web App). Leave to keep saving.
    var SHEET_ENDPOINT = 'https://script.google.com/macros/s/AKfycbxR3aFFFNJ-Tj-eeDD48wZpcGljAibrPqLXjOypH0205ZawjFOgDOQwSVis58sSF8EkIA/exec';
    // 2) GHL Inbound Webhook URL — paste it to push each submission into GHL so
    //    a Workflow can send the email. Leave "" to skip.
    var WEBHOOK_URL = '';
    // 3) Coach → thank-you page redirect (after submit).
    var pages = {
      Jase:  'https://thelbertd.github.io/bba-scholarship/thankyou-jase/index.html',
      Carly: 'https://thelbertd.github.io/bba-scholarship/thankyou-carly/index.html',
      Dom:   'https://thelbertd.github.io/bba-scholarship/thankyou-dom/index.html',
      Erin:  'https://thelbertd.github.io/bba-scholarship/thankyou-erin/index.html'
    };
    // ────────────────────────────────────────────────────────────────────

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      if (!form.reportValidity()) return;

      var btn = form.querySelector('.bba-submit');
      if (btn) { btn.disabled = true; btn.textContent = 'Submitting…'; }

      var data = {}, body = new URLSearchParams();
      new FormData(form).forEach(function (v, k) { data[k] = v; body.append(k, v); });

      var dest = pages[data.coach];
      var go = function () {
        if (!dest) return;
        // break out of an iframe if embedded, else normal redirect
        try { window.top.location.href = dest; } catch (_) { window.location.href = dest; }
      };

      var posts = [];
      if (SHEET_ENDPOINT) {
        posts.push(fetch(SHEET_ENDPOINT, { method: 'POST', mode: 'no-cors', body: body }));
      }
      if (WEBHOOK_URL) {
        posts.push(fetch(WEBHOOK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        }));
      }
      if (!posts.length) { go(); return; }
      (Promise.allSettled ? Promise.allSettled(posts) : Promise.all(posts.map(function (p) {
        return p.then(function (r) { return r; }, function (e) { return e; });
      }))).then(go, go);
    });
  })();
</script>
