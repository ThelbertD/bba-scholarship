<!--
  ════════════════════════════════════════════════════════════════════════
  PASTE THIS (AND ONLY THIS) INTO A GHL CUSTOM JS/HTML (CODE) ELEMENT.
  It loads the full scholarship page, makes it span the whole width, and
  auto-resizes the height so there is no inner scrollbar.
  You do NOT paste index-ghl.html — it is already hosted and loaded below.
  ════════════════════════════════════════════════════════════════════════
-->
<style>
  html, body { margin:0 !important; padding:0 !important; overflow-x:hidden !important; }
  #bba-frame { display:block; border:0; width:100%; }
</style>

<iframe
  id="bba-frame"
  src="https://thelbertd.github.io/bba-scholarship/index-ghl.html?v=18"
  style="width:100%; height:100vh; border:0; display:block;"
  allow="autoplay; fullscreen; picture-in-picture">
</iframe>

<script>
  // ═══════════════════════════════════════════════════════════════════════
  //  COACH → THANK-YOU PAGE  —  where each coach's applicants are sent after
  //  they submit the form. These point at the hosted thank-you pages so it
  //  works right now. If you build the thank-you steps inside GHL instead,
  //  replace any URL below with that GHL funnel-step's public URL.
  // ═══════════════════════════════════════════════════════════════════════
  var THANKYOU = {
    Jase:  "https://bba.betterbodyacademy.com/enteredjase",
    Carly: "https://bba.betterbodyacademy.com/enteredcarly",
    Dom:   "https://bba.betterbodyacademy.com/entereddom",
    Erin:  "https://bba.betterbodyacademy.com/enterederin"
  };

  window.addEventListener("message", function (e) {
    if (!e.data) return;

    // 1) Auto-resize the iframe to fit its content (no inner scrollbar).
    if (e.data.bbaHeight) {
      var f = document.getElementById("bba-frame");
      if (f) f.style.height = e.data.bbaHeight + "px";
    }

    // 2) Coach selected on the form → redirect this whole page to their
    //    GHL thank-you page.
    if (e.data.bbaCoach) {
      var url = THANKYOU[e.data.bbaCoach];
      if (url && url.indexOf("PASTE_") !== 0) {
        window.location.href = url;
      }
    }
  });

  // 3) Force every GHL wrapper around this block to full width AND collapse its
  //    height/min-height to the iframe. GHL sections have a built-in min-height
  //    that otherwise leaves empty space below the footer — this removes it.
  (function () {
    function fix() {
      var el = document.getElementById("bba-frame");
      el = el ? el.parentElement : null;
      while (el && el !== document.body) {
        el.style.setProperty("max-width", "100%", "important");
        el.style.setProperty("width", "100%", "important");
        el.style.setProperty("padding-left", "0", "important");
        el.style.setProperty("padding-right", "0", "important");
        el.style.setProperty("margin-left", "0", "important");
        el.style.setProperty("margin-right", "0", "important");
        el.style.setProperty("min-height", "0", "important");
        el.style.setProperty("height", "auto", "important");
        el = el.parentElement;
      }
    }
    fix();
    window.addEventListener("load", fix);
    // GHL re-applies its section min-height after load — keep collapsing it for
    // ~20s, then watch for later changes, so empty space can't return (mobile too).
    var n = 0, iv = setInterval(function () { fix(); if (++n > 40) clearInterval(iv); }, 500);
    if (window.MutationObserver) {
      try {
        new MutationObserver(fix).observe(document.body, {
          attributes: true, subtree: true, attributeFilter: ["style", "class"]
        });
      } catch (_) {}
    }
  })();
</script>
